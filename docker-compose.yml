version: '3.8'

services:
  # ===== BAZA DANYCH =====
  db:
    image: postgres:16-alpine
    container_name: currency_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: currency_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - currency_network

  # ===== BACKEND =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: currency_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/currency_db
      NBP_API_BASE_URL: https://api.nbp.pl/api
      ALLOWED_ORIGINS: '["http://localhost", "http://localhost:80", "http://localhost:4200", "http://frontend:80"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - currency_network

  # ===== FRONTEND =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: currency_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - currency_network

volumes:
  postgres_data:
    driver: local

networks:
  currency_network:
    driver: bridge
